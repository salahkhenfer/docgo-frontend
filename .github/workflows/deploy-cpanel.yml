name: Deploy (healthpathglobal.com)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-healthpathglobal
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy dist/ to cPanel (FTP/FTPS)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.CPANEL_FTP_SERVER }}
          username: ${{ secrets.CPANEL_FTP_USERNAME }}
          password: ${{ secrets.CPANEL_FTP_PASSWORD }}
          protocol: ftps
          port: 21
          local-dir: dist/
          server-dir: ${{ secrets.CPANEL_FTP_SERVER_DIR }}
          # If (and only if) this directory contains ONLY the built site, you can
          # enable the next line to delete removed/old files (prevents hash buildup).
          # dangerous-clean-slate: true
